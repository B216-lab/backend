name: Publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag to publish for both backend images"
        required: true
        default: "manual"
        type: string

permissions:
  contents: read
  packages: write
  attestations: write

env:
  GHCR_NAMESPACE: b216-lab

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          fail_on_error: true

      - name: Lint bootstrap Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.bootstrap
          fail_on_error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API image metadata
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Extract bootstrap image metadata
        id: bootstrap-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ github.event.repository.name }}-bootstrap
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: Build and push bootstrap image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bootstrap
          push: true
          tags: ${{ steps.bootstrap-meta.outputs.tags }}
          labels: ${{ steps.bootstrap-meta.outputs.labels }}
